<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wow Moments Admin - CMS</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#b90a5a',
                        secondary: '#9b3f5a',
                        surface: '#fff8f8',
                        'primary-container': '#ff4d8d',
                        'on-primary-container': '#5b0028',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Manrope', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #b90a5a 0%, #ff4d8d 100%);
        }
    </style>
</head>
<body class="bg-surface text-gray-800 min-h-screen font-sans">
    <!-- Header -->
    <header class="w-full bg-white/60 backdrop-blur-xl border-b border-white/40 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-xl font-extrabold tracking-tight text-primary leading-tight">Wow Moments Admin</span>
                <span class="text-[9px] text-gray-500 uppercase tracking-widest font-bold -mt-0.5">CMS Dashboard</span>
            </div>
            <button id="logout-btn" class="hidden px-4 py-2 rounded-full border border-primary text-primary font-bold text-xs hover:bg-primary/5 transition-all duration-200">
                Logout
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <!-- Login Section -->
        <section id="login-section" class="max-w-md mx-auto my-16 bg-white/75 glass-card rounded-[2rem] p-8 border border-white/50 shadow-xl">
            <h2 class="text-3xl font-extrabold text-gray-900 mb-2 tracking-tight">Admin Login</h2>
            <p class="text-sm text-gray-500 mb-6">Enter your administrator credentials to access the CMS.</p>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label for="username" class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-1">Username</label>
                    <input type="text" id="username" name="username" required class="w-full rounded-xl border-gray-200 focus:border-primary focus:ring-primary shadow-sm">
                </div>
                <div>
                    <label for="password" class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-1">Password</label>
                    <input type="password" id="password" name="password" required class="w-full rounded-xl border-gray-200 focus:border-primary focus:ring-primary shadow-sm">
                </div>
                <div id="login-error" class="text-sm text-red-600 font-medium hidden"></div>
                <button type="submit" class="w-full py-3.5 rounded-xl btn-gradient text-white font-bold shadow-lg hover:shadow-xl active:scale-98 transition-all duration-200">
                    Sign In
                </button>
            </form>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboard-section" class="hidden space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Template Creation Form -->
                <div class="lg:col-span-5 bg-white/75 glass-card rounded-[2rem] p-6 shadow-lg h-fit border border-white/50">
                    <h2 id="form-title" class="text-2xl font-extrabold text-gray-900 mb-2">Create New Template</h2>
                    <p id="form-subtitle" class="text-sm text-gray-500 mb-6">Fill in details to add a template card to the grid.</p>
                    
                    <form id="template-form" class="space-y-4" enctype="multipart/form-data">
                        <div>
                            <label for="name" class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-1">Template Name</label>
                            <input type="text" id="name" name="name" placeholder="e.g. Love Letters, Birthday Special" required class="w-full rounded-xl border-gray-200 focus:border-primary focus:ring-primary shadow-sm">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="price" class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-1">Price (₹)</label>
                                <input type="number" id="price" name="price" placeholder="129" required class="w-full rounded-xl border-gray-200 focus:border-primary focus:ring-primary shadow-sm">
                            </div>
                            <div>
                                <label for="tag" class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-1">Tag (Optional)</label>
                                <input type="text" id="tag" name="tag" placeholder="e.g. New, Trending" class="w-full rounded-xl border-gray-200 focus:border-primary focus:ring-primary shadow-sm">
                            </div>
                        </div>

                        <div>
                            <label for="tagColor" class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-1">Tag Background Color</label>
                            <select id="tagColor" name="tagColor" class="w-full rounded-xl border-gray-200 focus:border-primary focus:ring-primary shadow-sm">
                                <option value="bg-primary">Pink (Primary)</option>
                                <option value="bg-secondary">Magenta (Secondary)</option>
                                <option value="bg-[#ff4d8d]">Bright Pink</option>
                                <option value="bg-green-600">Green</option>
                                <option value="bg-amber-500">Gold/Yellow</option>
                            </select>
                        </div>

                        <div>
                            <label for="description" class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-1">Description</label>
                            <textarea id="description" name="description" rows="3" placeholder="Describe the template's features..." required class="w-full rounded-xl border-gray-200 focus:border-primary focus:ring-primary shadow-sm"></textarea>
                        </div>

                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-2">Categories</label>
                            <div class="flex flex-wrap gap-4">
                                <label class="inline-flex items-center text-sm font-semibold text-gray-700">
                                    <input type="checkbox" name="categories" value="love" class="rounded border-gray-300 text-primary focus:ring-primary mr-1.5"> Love
                                </label>
                                <label class="inline-flex items-center text-sm font-semibold text-gray-700">
                                    <input type="checkbox" name="categories" value="birthday" class="rounded border-gray-300 text-primary focus:ring-primary mr-1.5"> Birthday
                                </label>
                                <label class="inline-flex items-center text-sm font-semibold text-gray-700">
                                    <input type="checkbox" name="categories" value="anniversary" class="rounded border-gray-300 text-primary focus:ring-primary mr-1.5"> Anniversary
                                </label>
                                <label class="inline-flex items-center text-sm font-semibold text-gray-700">
                                    <input type="checkbox" name="categories" value="proposal" class="rounded border-gray-300 text-primary focus:ring-primary mr-1.5"> Proposal
                                </label>
                                <label class="inline-flex items-center text-sm font-semibold text-gray-700">
                                    <input type="checkbox" name="categories" value="family" class="rounded border-gray-300 text-primary focus:ring-primary mr-1.5"> Family
                                </label>
                                <label class="inline-flex items-center text-sm font-semibold text-gray-700">
                                    <input type="checkbox" name="categories" value="friendship" class="rounded border-gray-300 text-primary focus:ring-primary mr-1.5"> Friendship
                                </label>
                                <label class="inline-flex items-center text-sm font-semibold text-gray-700">
                                    <input type="checkbox" name="categories" value="festival" class="rounded border-gray-300 text-primary focus:ring-primary mr-1.5"> Festival & Culture
                                </label>
                                <label class="inline-flex items-center text-sm font-semibold text-gray-700">
                                    <input type="checkbox" name="categories" value="customized" class="rounded border-gray-300 text-primary focus:ring-primary mr-1.5"> Customized
                                </label>
                            </div>
                        </div>

                        <div>
                            <label for="preview" class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-1">Preview URL (Optional)</label>
                            <input type="url" id="preview" name="preview" placeholder="https://demo.kolkode.in/" class="w-full rounded-xl border-gray-200 focus:border-primary focus:ring-primary shadow-sm">
                        </div>

                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-1">Preview Image File</label>
                            <input type="file" id="imageFile" name="imageFile" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-primary/10 file:text-primary hover:file:bg-primary/20">
                            <span id="image-help-text" class="block text-[10px] text-gray-400 mt-1">Select an image to upload to the server.</span>
                        </div>

                        <div id="form-error" class="text-sm text-red-600 font-medium hidden"></div>
                        <div id="form-success" class="text-sm text-green-600 font-medium hidden">Template posted successfully!</div>

                        <button type="submit" id="form-submit-btn" class="w-full py-3 rounded-xl btn-gradient text-white font-bold shadow-md hover:shadow-lg active:scale-98 transition-all duration-200">
                            Add Template
                        </button>
                        <button type="button" id="cancel-edit-btn" class="w-full mt-2 py-2.5 rounded-xl border border-gray-300 text-gray-700 font-bold hover:bg-gray-50 active:scale-98 transition-all duration-200 hidden">
                            Cancel Edit
                        </button>
                    </form>
                </div>

                <!-- Template Management Grid -->
                <div class="lg:col-span-7 space-y-4">
                    <div class="flex justify-between items-center">
                        <h2 class="text-2xl font-extrabold text-gray-900">Current Templates</h2>
                        <span id="templates-count" class="px-3 py-1 rounded-full bg-primary/10 text-primary text-xs font-bold">0 Templates</span>
                    </div>

                    <div id="admin-templates-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Templates dynamic list will render here -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="admin.js"></script>
</body>
</html>
